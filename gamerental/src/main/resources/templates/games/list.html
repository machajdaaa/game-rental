<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head th:replace="~{layout :: head('Hry')}"></head>
<body>

<nav th:replace="~{layout :: navbar}"></nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Hry</h2>
        <a href="/games/new" class="btn btn-primary" sec:authorize="hasRole('ADMIN')">Přidat hru</a>
    </div>

    <form th:action="@{/games}" method="get" class="mb-4">
        <div class="input-group">
            <input type="text" name="search" class="form-control"
                   placeholder="Hledat hru..." th:value="${search}">
            <button type="submit" class="btn btn-outline-secondary">Hledat</button>
        </div>
    </form>

    <div class="row">
        <div th:each="game : ${games}" class="col-md-4 mb-3">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title" th:text="${game.title}"></h5>
                    <p class="card-text">
                        <small class="text-muted">
                            Hráči: <span th:text="${game.minPlayers + '-' + game.maxPlayers}"></span>
                        </small><br>
                        <small class="text-muted">
                            Věk: <span th:text="${game.minAge + '+'}"></span>
                        </small>
                    </p>
                    <a th:href="@{/games/{id}(id=${game.id})}" class="btn btn-sm btn-outline-primary">Detail</a>
                </div>
            </div>
        </div>
        <div th:if="${#lists.isEmpty(games)}" class="col">
            <p class="text-muted">Žádné hry nenalezeny.</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
