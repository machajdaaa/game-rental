<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Herní půjčovna</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/games">Herní půjčovna</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/games">Hry</a>
            <a class="nav-link" href="/loans" sec:authorize="isAuthenticated()">Moje výpůjčky</a>
            <a class="nav-link" href="/admin/users" sec:authorize="hasRole('ADMIN')">Uživatelé</a>
            <a class="nav-link" href="/loans/admin" sec:authorize="hasRole('ADMIN')">Všechny výpůjčky</a>
            <a class="nav-link" href="/profile" sec:authorize="isAuthenticated()">Profil</a>
            <a class="nav-link" href="/login" sec:authorize="!isAuthenticated()">Přihlásit se</a>
            <form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()" class="d-inline">
                <button type="submit" class="btn btn-link nav-link">Odhlásit</button>
            </form>
        </div>
    </div>
</nav>

</body>
</html>
