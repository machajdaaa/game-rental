<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Moje rezervace')}"></head>
<body>

<nav th:replace="~{layout :: navbar}"></nav>

<div class="container">
    <h2 class="mb-4">Moje rezervace</h2>

    <div th:if="${#lists.isEmpty(reservations)}" class="alert alert-info">
        Nemáte žádné rezervace.
    </div>

    <table th:unless="${#lists.isEmpty(reservations)}" class="table table-striped">
        <thead>
        <tr>
            <th>Hra</th>
            <th>Výtisk</th>
            <th>Datum rezervace</th>
            <th>Status</th>
            <th>Akce</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="reservation : ${reservations}">
            <td th:text="${reservation.gameCopy.game.title}"></td>
            <td th:text="${reservation.gameCopy.inventoryCode}"></td>
            <td th:text="${reservation.reservedDate}"></td>
            <td>
                    <span th:text="${reservation.status}"
                          th:classappend="${reservation.status.name() == 'PENDING'} ? 'badge bg-warning' :
                                         (${reservation.status.name() == 'ACTIVE'} ? 'badge bg-success' :
                                         'badge bg-secondary')">
                    </span>
            </td>
            <td>
                <form th:if="${reservation.status.name() != 'CANCELLED'}"
                      th:action="@{/reservations/{id}/cancel(id=${reservation.id})}"
                      method="post">
                    <button type="submit" class="btn btn-sm btn-danger">Zrušit</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
