<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head th:replace="~{layout :: head('Notifikace')}"></head>
<body>

<nav th:replace="~{layout :: navbar}"></nav>

<div class="container">
    <h2 class="mb-4">Moje notifikace</h2>

    <div th:if="${#lists.isEmpty(notifications)}" class="alert alert-info">
        Žádné notifikace.
    </div>

    <div th:each="notification : ${notifications}"
         th:classappend="${notification.read} ? 'opacity-50'"
         class="card mb-2">
        <div class="card-body d-flex justify-content-between align-items-center">
            <div>
                <p class="mb-0" th:text="${notification.message}"></p>
                <small class="text-muted" th:text="${notification.sentAt}"></small>
            </div>
            <form th:if="${!notification.read}"
                  th:action="@{/notifications/{id}/read(id=${notification.id})}"
                  method="post">
                <button type="submit" class="btn btn-sm btn-outline-secondary">
                    Označit jako přečtené
                </button>
            </form>
            <span th:if="${notification.read}" class="badge bg-secondary">Přečteno</span>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
